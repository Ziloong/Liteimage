name: LiteImagePng
options:
  bundleIdPrefix: com.ziloong
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    PRODUCT_BUNDLE_IDENTIFIER: com.ziloong.LiteImagePng

targets:
  LiteImagePng:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
        buildPhase: sources
      - path: Assets.xcassets
      - path: Resources/ffmpeg
      - path: Resources/gifski
      - path: Resources/pngquant
      - path: Resources/libpng16.16.dylib
      - path: AppIcon.icns
      - path: Sources/en.lproj
        type: folder
        buildPhase: resources
      - path: Sources/zh-Hans.lproj
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "轻图"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "轻图"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        COPY_PHASE_STRIP: NO
        ALWAYS_COPY_BINARY_FILES_PRODUCT: YES
    dependencies: []
